<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Suivi de Flotte Engins</title>

    <!-- PWA -->
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Gestion et suivi de la flotte d'engins en temps réel" />
    <link rel="manifest" href="/Suivi-de-Flotte-Engins/manifest.webmanifest" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/Suivi-de-Flotte-Engins/images/logo.png" />
    <link rel="apple-touch-icon" href="/Suivi-de-Flotte-Engins/images/logo.png" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flotte Engins" />

    <!-- Splash screen styles -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        animation: splashFadeOut 0.5s ease-out 1.4s forwards;
      }
      #splash img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        border-radius: 18px;
        background: rgba(255,255,255,0.05);
        padding: 10px;
        animation: splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
      }
      #splash h1 {
        color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
        margin: 0;
        animation: splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
      }
      #splash p {
        color: #64748b;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin: -12px 0 0;
        animation: splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
      }
      #splash-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(59,130,246,0.2);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: splashSpin 0.8s linear infinite, splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;
      }
      @keyframes splashFadeOut {
        to { opacity: 0; visibility: hidden; pointer-events: none; }
      }
      @keyframes splashPop {
        from { opacity: 0; transform: scale(0.85) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes splashSpin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="/Suivi-de-Flotte-Engins/assets/index-BziZL0J3.js"></script>
    <link rel="stylesheet" crossorigin href="/Suivi-de-Flotte-Engins/assets/index-DWalPmfe.css">
  <link rel="manifest" href="/Suivi-de-Flotte-Engins/manifest.webmanifest"></head>
  <body>
    <!-- Splash screen — hidden automatically by CSS after 1.4s -->
    <div id="splash">
      <img src="/Suivi-de-Flotte-Engins/images/logo.png" alt="" />
      <h1>Suivi de Flotte Engins</h1>
      <p>Interface Aéroportuaire</p>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>
  </body>
</html>
